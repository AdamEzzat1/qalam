name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          # Ensure .gitattributes line-ending rules are applied on checkout.
          # Without this, autocrlf could re-introduce CRLF on Windows.
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --verbose

      - name: cargo test
        run: cargo test --workspace --verbose

      # Real cross-OS determinism check: run `qalam normalize` over the golden
      # corpus and capture its bytes. The reproducibility job below diffs the
      # captures across OSes. This is the FIRST active determinism gate in
      # the project — added in Phase 1 Stage 1.1.
      - name: Run `qalam normalize` over golden corpus
        shell: bash
        run: |
          cargo run --package qalam-cli --quiet -- \
            normalize --input tests/fixtures/golden_corpus.txt \
            > normalize-output-${{ matrix.os }}.txt

      - name: Upload normalize output
        uses: actions/upload-artifact@v4
        with:
          name: normalize-output-${{ matrix.os }}
          path: normalize-output-${{ matrix.os }}.txt

  reproducibility:
    name: Cross-OS determinism gate
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: normalize-output-ubuntu-latest
          path: ./linux
      - uses: actions/download-artifact@v4
        with:
          name: normalize-output-macos-latest
          path: ./macos
      - uses: actions/download-artifact@v4
        with:
          name: normalize-output-windows-latest
          path: ./windows
      - name: Diff outputs byte-for-byte
        shell: bash
        run: |
          set -e
          echo "--- byte sizes ---"
          wc -c linux/normalize-output-ubuntu-latest.txt \
                macos/normalize-output-macos-latest.txt \
                windows/normalize-output-windows-latest.txt
          echo "--- hex prefixes (first 64 bytes) ---"
          for f in linux/normalize-output-ubuntu-latest.txt \
                   macos/normalize-output-macos-latest.txt \
                   windows/normalize-output-windows-latest.txt; do
            echo "$f:"
            head -c 64 "$f" | od -An -tx1
          done
          echo "--- diffs (any output below = FAIL) ---"
          diff linux/normalize-output-ubuntu-latest.txt macos/normalize-output-macos-latest.txt
          diff linux/normalize-output-ubuntu-latest.txt windows/normalize-output-windows-latest.txt
          echo
          echo "Cross-OS determinism: PASS"
