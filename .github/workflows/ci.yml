name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          # Ensure .gitattributes line-ending rules are applied on checkout.
          # Without this, autocrlf could re-introduce CRLF on Windows.
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --verbose

      - name: cargo test
        run: cargo test --workspace --verbose

      # Real cross-OS determinism check: run the implemented CLI commands over
      # the golden corpus and capture their bytes into one combined artifact.
      # The reproducibility job below diffs the captures across OSes. Covers
      # `normalize` (Stage 1.1) and `freq` (this PR: tokenize + frequency).
      - name: Capture deterministic CLI output over golden corpus
        shell: bash
        run: |
          {
            echo "## normalize"
            cargo run --package qalam-cli --quiet -- \
              normalize --input tests/fixtures/golden_corpus.txt
            echo
            echo "## freq"
            cargo run --package qalam-cli --quiet -- \
              freq --input tests/fixtures/golden_corpus.txt
            echo
            echo "## segment"
            cargo run --package qalam-cli --quiet -- \
              segment --input tests/fixtures/golden_corpus.txt
            echo
            echo "## analyze"
            cargo run --package qalam-cli --quiet -- \
              analyze --jsonl --reproducibility-mode \
              --input tests/fixtures/golden_corpus.txt
          } > cli-output-${{ matrix.os }}.txt

      - name: Upload CLI output
        uses: actions/upload-artifact@v4
        with:
          name: cli-output-${{ matrix.os }}
          path: cli-output-${{ matrix.os }}.txt

  reproducibility:
    name: Cross-OS determinism gate
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cli-output-ubuntu-latest
          path: ./linux
      - uses: actions/download-artifact@v4
        with:
          name: cli-output-macos-latest
          path: ./macos
      - uses: actions/download-artifact@v4
        with:
          name: cli-output-windows-latest
          path: ./windows
      - name: Diff outputs byte-for-byte
        shell: bash
        run: |
          set -e
          L=linux/cli-output-ubuntu-latest.txt
          M=macos/cli-output-macos-latest.txt
          W=windows/cli-output-windows-latest.txt
          echo "--- byte sizes ---"
          wc -c "$L" "$M" "$W"
          echo "--- hex prefixes (first 64 bytes) ---"
          for f in "$L" "$M" "$W"; do
            echo "$f:"
            head -c 64 "$f" | od -An -tx1
          done
          echo "--- diffs (any output below = FAIL) ---"
          diff "$L" "$M"
          diff "$L" "$W"
          echo
          echo "Cross-OS determinism: PASS (normalize + freq, x86_64 + aarch64)"
